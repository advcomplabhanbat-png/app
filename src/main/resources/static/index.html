<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta name="theme-color" content="#F2F2F7"/>
<title>PostureIQ</title>
<link href="/favicon.svg" rel="icon" type="image/svg+xml"/>
<link href="/apple-base.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@200..700,0..1,-50..200,20..48&amp;display=swap" rel="stylesheet"/>
<script src="/tailwind-config.js"></script>
<style>
  body { background-color: var(--ios-bg); min-height: 100dvh; padding-bottom: 96px; }
</style>
</head>
<body>

<!-- Minimal iOS Top Bar — just profile -->
<header class="ios-nav-bar fixed top-0 left-0 right-0 z-50 pt-safe">
  <div class="flex justify-end items-center px-5 h-11">
    <button class="w-8 h-8 rounded-full overflow-hidden ios-tap-spring">
      <img alt="Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCjqNPvkaWX8bDMST_3hIZm0a19hQjA1E9gh6594QGtvditsyHgK-sNBBpfaYiukHzO6l3UT5nFPz2rOrydSpT40G00rhqkpIsSRc3cgdMyPSBZjBz1r5fjwDCmfxuQLxfKZ7pyuHQOOXhNzGBkzj3coet5_2Tk46Ql0vV1KwfluQsC6Rlk63MjJt-ip235maQFqQctd0voFkee7dU-EX2YLwOAzQkLwBzNSR8QUWhgfMInwnvCu8IXSim2VVfVK6mMs7WZE9A9fQS-"/>
    </button>
  </div>
</header>

<main class="pt-14 px-5 max-w-md mx-auto">

  <!-- Large Title -->
  <section class="pt-4 pb-6">
    <p class="ios-footnote" style="color: var(--ios-label-secondary);">민수님</p>
    <h1 class="ios-large-title mt-0.5">대시보드</h1>
  </section>

  <!-- Hero: Balance -->
  <section class="ios-card p-5 mb-4">
    <div class="flex justify-between items-baseline mb-5">
      <h2 class="ios-title-2">균형 잡힘</h2>
      <span class="flex items-center gap-1.5 ios-footnote" style="color: var(--ios-label-secondary);">
        <span class="w-1.5 h-1.5 rounded-full inline-block" style="background: var(--ios-blue);"></span>
        실시간
      </span>
    </div>
    <div class="relative h-1.5 rounded-full overflow-hidden" style="background: var(--ios-fill-tertiary);">
      <div class="absolute left-0 top-0 h-full rounded-full" style="width: 48%; background: var(--ios-blue);"></div>
    </div>
    <div class="flex justify-between mt-3 ios-footnote">
      <span style="color: var(--ios-label);"><span class="font-semibold">48%</span> <span style="color: var(--ios-label-tertiary);">왼발</span></span>
      <span style="color: var(--ios-label);"><span class="font-semibold">52%</span> <span style="color: var(--ios-label-tertiary);">오른발</span></span>
    </div>
  </section>

  <!-- Alert (subtle, list-row style) -->
  <a href="/live.html" class="ios-card mb-4 px-5 py-4 flex items-center gap-3">
    <span class="material-symbols-outlined ios-icon" style="color: var(--ios-orange); font-size: 20px;">error</span>
    <div class="flex-1 min-w-0">
      <p class="ios-body font-semibold">불균형 감지</p>
      <p class="ios-footnote mt-0.5" style="color: var(--ios-label-secondary);">오른쪽 쏠림이 15분간 지속됨</p>
    </div>
    <span class="material-symbols-outlined ios-icon" style="color: var(--ios-label-quaternary); font-size: 18px;">chevron_right</span>
  </a>

  <!-- Stats grid (minimal) -->
  <div class="grid grid-cols-2 gap-3 mb-4">
    <div class="ios-card p-4">
      <p class="ios-footnote" style="color: var(--ios-label-secondary);">걸음 수</p>
      <p class="ios-title-1 mt-1">8,432</p>
    </div>
    <div class="ios-card p-4">
      <p class="ios-footnote" style="color: var(--ios-label-secondary);">활동 시간</p>
      <p class="ios-title-1 mt-1">42<span class="ios-headline ml-0.5" style="color: var(--ios-label-tertiary);">분</span></p>
    </div>
  </div>

  <!-- Heatmap card (minimal) -->
  <section class="ios-card p-5 mb-4">
    <h2 class="ios-headline mb-4">발바닥 압력</h2>
    <div class="flex justify-around items-center h-40">
      <div class="relative w-16 h-36 rounded-[40%_40%_30%_30%] overflow-hidden" style="background: var(--ios-fill-tertiary);">
        <div class="absolute inset-0" style="background: radial-gradient(circle at 50% 30%, rgba(0,122,255,0.45) 0%, transparent 55%), radial-gradient(circle at 50% 78%, rgba(0,122,255,0.30) 0%, transparent 60%);"></div>
      </div>
      <div class="relative w-16 h-36 rounded-[40%_40%_30%_30%] overflow-hidden" style="background: var(--ios-fill-tertiary);">
        <div class="absolute inset-0" style="background: radial-gradient(circle at 50% 25%, rgba(0,122,255,0.50) 0%, transparent 55%), radial-gradient(circle at 50% 75%, rgba(0,122,255,0.55) 0%, transparent 60%);"></div>
      </div>
    </div>
    <div class="flex justify-around mt-2 ios-caption-2" style="color: var(--ios-label-tertiary); letter-spacing: 0.06em;">
      <span>왼발</span>
      <span>오른발</span>
    </div>
  </section>

  <!-- Weekly chart (minimal) -->
  <section class="ios-card p-5 mb-4">
    <h2 class="ios-headline mb-4">주간 안정도</h2>
    <div class="flex justify-between items-end gap-2 h-24 mb-2">
      <div class="flex flex-col items-center gap-2 flex-1">
        <div class="w-full rounded-sm" style="height: 60%; background: var(--ios-fill);"></div>
      </div>
      <div class="flex flex-col items-center gap-2 flex-1">
        <div class="w-full rounded-sm" style="height: 85%; background: var(--ios-fill);"></div>
      </div>
      <div class="flex flex-col items-center gap-2 flex-1">
        <div class="w-full rounded-sm" style="height: 40%; background: var(--ios-fill);"></div>
      </div>
      <div class="flex flex-col items-center gap-2 flex-1">
        <div class="w-full rounded-sm" style="height: 95%; background: var(--ios-blue);"></div>
      </div>
      <div class="flex flex-col items-center gap-2 flex-1 opacity-25">
        <div class="w-full h-20 rounded-sm" style="background: var(--ios-fill);"></div>
      </div>
      <div class="flex flex-col items-center gap-2 flex-1 opacity-25">
        <div class="w-full h-20 rounded-sm" style="background: var(--ios-fill);"></div>
      </div>
      <div class="flex flex-col items-center gap-2 flex-1 opacity-25">
        <div class="w-full h-20 rounded-sm" style="background: var(--ios-fill);"></div>
      </div>
    </div>
    <div class="flex justify-between ios-caption-2" style="color: var(--ios-label-tertiary);">
      <span class="flex-1 text-center">월</span>
      <span class="flex-1 text-center">화</span>
      <span class="flex-1 text-center">수</span>
      <span class="flex-1 text-center font-semibold" style="color: var(--ios-blue);">오늘</span>
      <span class="flex-1 text-center opacity-50">금</span>
      <span class="flex-1 text-center opacity-50">토</span>
      <span class="flex-1 text-center opacity-50">일</span>
    </div>
  </section>

  <!-- Single primary action -->
  <a href="/analysis.html" class="ios-btn-filled flex items-center justify-center gap-1.5 mb-3">
    종합 분석 보기
  </a>

</main>

<!-- iOS Translucent Bottom Tab Bar -->
<nav class="ios-tab-bar fixed bottom-0 left-0 right-0 z-50 pb-safe">
  <div class="flex justify-around items-center px-2 pt-2 pb-1 max-w-md mx-auto">
    <a href="/index.html" class="flex flex-col items-center gap-0.5 py-1 px-3 ios-tap-spring" style="color: var(--ios-blue);">
      <span class="material-symbols-outlined ios-icon-fill" style="font-size: 26px;">home</span>
      <span class="ios-caption-2 font-semibold">홈</span>
    </a>
    <a href="/live.html" class="flex flex-col items-center gap-0.5 py-1 px-3 ios-tap-spring" style="color: var(--ios-label-secondary);">
      <span class="material-symbols-outlined ios-icon" style="font-size: 26px;">monitor_heart</span>
      <span class="ios-caption-2">실시간</span>
    </a>
    <a href="/reports.html" class="flex flex-col items-center gap-0.5 py-1 px-3 ios-tap-spring" style="color: var(--ios-label-secondary);">
      <span class="material-symbols-outlined ios-icon" style="font-size: 26px;">bar_chart</span>
      <span class="ios-caption-2">리포트</span>
    </a>
    <a href="/device.html" class="flex flex-col items-center gap-0.5 py-1 px-3 ios-tap-spring" style="color: var(--ios-label-secondary);">
      <span class="material-symbols-outlined ios-icon" style="font-size: 26px;">settings</span>
      <span class="ios-caption-2">설정</span>
    </a>
  </div>
</nav>

</body></html>
